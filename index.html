<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlyDrop | Future of Sync</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-canvas">
        <div class="orb" style="top: 15%; left: 20%;"></div>
        <div class="orb" style="bottom: 10%; right: 20%; animation-delay: -5s;"></div>
    </div>

    <nav>
        <div class="logo">
            <span>PlyDrop</span>
        </div>
    </nav>

    <main class="main-card">
        <h1>Launching Soon</h1>
        
        <form id="waitlistForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="name@domain.com" required>
            </div>
            
            <div class="input-group">
                <label>Access Code (Optional)</label>
                <input type="text" id="accessCode" placeholder="Enter code if any">
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">Request Access</button>
        </form>
    </main>

    <div class="social-dock">
        <a href="https://www.instagram.com/plydrop_platform/" class="social-icon" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://www.facebook.com/share/17PtXZZu8X/" class="social-icon" title="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="https://x.com/plydrop" class="social-icon" title="X (Twitter)"><i class="fa-brands fa-x-twitter"></i></a>
    </div>

    <script src="script.js"></script>
</body>
</html>
